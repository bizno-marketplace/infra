apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: bizno
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:13.1.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef: { name: grafana-admin-secret, key: GF_SECURITY_ADMIN_USER }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: { name: grafana-admin-secret, key: GF_SECURITY_ADMIN_PASSWORD }
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /etc/grafana/provisioning/dashboards/json
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-json
            # created by secrets/create-secrets.sh, generated directly
            # from provisioning/dashboards/json/bizno-auth-overview.json
            # — always in sync, never a manually maintained copy
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: bizno
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP   # use port-forward to access locally on k3s