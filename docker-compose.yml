services:
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: bizno-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # required on Linux; no-op on Mac/Windows
    networks:
      - bizno-net           # to reach services when they run in Docker
      - observability-net   # internal network for Prometheus <-> Grafana

  grafana:
    image: grafana/grafana:13.1.0
    container_name: bizno-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability-net
    depends_on:
      - prometheus

volumes:
  grafana-data:

networks:
  observability-net:
    driver: bridge

  bizno-net:
    external: true
    # Network shared with your main docker-compose. Only used when
    # services run in Docker; if you're only using the IDE, this
    # network still exists but simply has no containers on it
    # (targets show DOWN, no problem).
    #
    # Create it if it doesn't exist yet:
    #   docker network create bizno-net
    #
    # And make sure your main docker-compose also joins the services
    # (auth-service, api-gateway, discovery-server, config-server) to
    # this same external network, so the names resolve.