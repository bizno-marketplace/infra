services:
  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: bizno-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # required on Linux; no-op on Mac/Windows
    networks:
      - bizno-net           # to reach services when they run in Docker
      - observability-net   # internal network for Prometheus <-> Grafana <-> Loki

  loki:
    image: grafana/loki:3.7.3
    container_name: bizno-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - bizno-net           # services push logs here directly (Loki4j appender)
      - observability-net

  grafana:
    image: grafana/grafana:13.1.0
    container_name: bizno-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - observability-net
    depends_on:
      - prometheus
      - loki

  zipkin:
    image: openzipkin/zipkin:3.6.0
    container_name: bizno-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - bizno-net           # services push spans here directly
      - observability-net
    # Default storage is in-memory — traces are lost on restart. Fine for
    # local dev; swap STORAGE_TYPE (Elasticsearch, etc.) before relying on
    # this for anything long-lived.

  redis:
    image: redis:8.8.0-alpine
    container_name: bizno-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bizno-net

  postgres:
    image: postgres:17.10-alpine
    container_name: bizno-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bizno}
      - POSTGRES_USER=${POSTGRES_USER:-bizno}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - bizno-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizno} -d ${POSTGRES_DB:-bizno_auth}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bizno-net

  nats:
    image: nats:2.14.3-alpine
    container_name: bizno-nats
    command: [ "-js", "-m", "8222" ]
    ports:
      - "4222:4222"   # porta cliente (o que o teu NatsConfig usa via broker.url)
      - "8222:8222"   # monitoring HTTP (útil para debug/health check)
    volumes:
      - nats-data:/data
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bizno-net

volumes:
  bizno-postgres-data:
  grafana-data:
  loki-data:
  nats-data:

networks:
  observability-net:
    driver: bridge

  bizno-net:
    external: true
    # Network shared with the 4 services + messaging. Only used when
    # services run in Docker; if you're only using the IDE, this
    # network still exists but simply has no containers on it
    # (targets show DOWN, no problem).
    #
    # Create it if it doesn't exist yet:
    #   docker network create bizno-net